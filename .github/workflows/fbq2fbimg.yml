name: fbq2fb with IMG

on:
  #schedule:
  #  - cron: '*/5 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Run Script
        env:
        
          campID: ${{ secrets.campID }}
          toolID: ${{ secrets.toolID }}
          rotationID: ${{ secrets.rotationID }}
          
          FB_PAGE_FBQ_ID: ${{ secrets.FB_PAGE_FBQ_ID}}
          FB_PAGE_FBQ_TOKEN: ${{ secrets.FB_PAGE_FBQ_TOKEN }}
          
          FB_PAGE_ESQ_ID: ${{ secrets.FB_PAGE_ESQ_ID }}
          FB_PAGE_ESQ_TOKEN: ${{ secrets.FB_PAGE_ESQ_TOKEN }}
          
        run: php fbq2fb.php

      - name: Commit Updated List
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add listfbq.json state.json
          if ! git diff --quiet --staged; then
            git commit -m "posted and updated"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes to commit"
          fi
